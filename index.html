<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>H1CL 小贩中心进阶词汇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0f172a; font-family: 'Noto Sans SC', sans-serif; }
        .app-container { width: 100vw; height: 100vh; display: flex; flex-direction: column; position: relative; }
        .card-inner { width: 100%; height: 100%; display: flex; flex-direction: column; transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%); }
        .card-back-mode { background: #ffffff !important; }
        .word-display { font-size: clamp(2.5rem, 12vw, 4.5rem); font-weight: 900; color: #92400e; text-align: center; line-height: 1.2; padding: 0 1.5rem; }
        .voice-btn { width: 64px; height: 64px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 25px rgba(180, 83, 9, 0.15); transition: transform 0.2s; }
        .voice-btn:active { transform: scale(0.9); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div id="card" class="card-inner shadow-xl" onclick="flip()">
        <!-- 顶部区域 -->
        <div class="pt-8 text-center">
            <span class="text-[10px] font-black text-amber-600/60 tracking-[0.4em] uppercase">H1CL 必学词语</span>
            <h1 class="text-xl font-black text-amber-900 mt-1">小贩中心</h1>
            
            <!-- 英文操作提示移至此处 -->
            <div class="mt-2">
                <span class="text-[10px] font-bold text-amber-700/50 bg-amber-200/30 px-3 py-1 rounded-full uppercase tracking-widest">Tap or Space to flip</span>
            </div>

            <div class="mt-4 inline-flex bg-amber-200/50 px-4 py-1 rounded-full border border-amber-300/30">
                <span id="counter" class="text-amber-800 font-bold text-xs">1 / 20</span>
            </div>
        </div>

        <!-- 正面 -->
        <div id="front" class="flex-1 flex flex-col items-center justify-center pb-20">
            <button onclick="event.stopPropagation(); playVoice();" class="voice-btn mb-12">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" /></svg>
            </button>
            <div id="word-front" class="word-display">古早味</div>
        </div>

        <!-- 反面 -->
        <div id="back" class="hidden flex-1 flex flex-col px-8 py-6 overflow-hidden">
            <div class="border-b-4 border-amber-50 pb-4 mb-6 text-center">
                <h2 id="word-back" class="text-3xl font-black text-slate-800">古早味</h2>
                <p id="pinyin" class="text-xl font-bold text-amber-600 italic mt-1">gǔ zǎo wèi</p>
            </div>
            <div class="flex-1 overflow-y-auto no-scrollbar space-y-6 pb-10">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">词义解释 Meaning</label>
                    <p id="meaning" class="text-lg text-slate-700 leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-100 italic">Nostalgic / Traditional taste</p>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">词语搭配 Collocation</label>
                    <p id="collocation" class="text-xl font-bold text-slate-800 leading-snug"></p>
                </div>
            </div>
            <div class="text-center text-slate-300 text-[10px] font-bold tracking-widest pb-4 uppercase">再次点击返回</div>
        </div>

        <!-- 底部滑动提示 -->
        <div class="absolute bottom-6 w-full text-center">
             <p class="text-[9px] text-amber-900/40 font-bold uppercase tracking-[0.2em]">左右滑动切换词条</p>
        </div>
    </div>
</div>
<script>
    const data = [
        { w: "古早味", p: "gǔ zǎo wèi", m: "Nostalgic / Traditional taste", c: "这里的排骨面保留了最纯正的古早味。" },
        { w: "经济实惠", p: "jīng jì shí huì", m: "Economical and practical", c: "小贩中心的食物经济实惠，深受上班族欢迎。" },
        { w: "阶层", p: "jiē céng", m: "Social stratum / Class", c: "无论来自哪个社会阶层，大家都在这里用餐。" },
        { w: "价廉物美", p: "jià lián wù měi", m: "Cheap and good quality", c: "新加坡的小贩美食一向以价廉物美著称。" },
        { w: "传统风味", p: "chuán tǒng fēng wèi", m: "Traditional flavor", c: "许多老摊位依然坚持传统的制作工艺和传统风味。" },
        { w: "气氛热闹", p: "qì fēn rè nao", m: "Lively atmosphere", c: "每到周末，小贩中心总是气氛热闹，座无虚席。" },
        { w: "海南鸡饭", p: "hǎi nán jī fàn", m: "Hainanese Chicken Rice", c: "海南鸡饭是新加坡最著名的国菜之一。" },
        { w: "印度煎饼", p: "yìn dù jiān bǐng", m: "Roti Prata", c: "印度煎饼配上浓郁的咖喱，风味独特。" },
        { w: "椰浆饭", p: "yē jiāng fàn", m: "Nasi Lemak", c: "充满椰香的椰浆饭是许多人早餐的首选。" },
        { w: "双薪家庭", p: "shuāng xīn jiā tíng", m: "Dual-income family", c: "对于忙碌的双薪家庭来说，在小贩中心解决三餐非常方便。" },
        { w: "社会饭厅", p: "shè huì fàn tīng", m: "Social dining room", c: "小贩中心不仅是吃饭的地方，更是国人的社会饭厅。" },
        { w: "集体记忆", p: "jí tǐ jì yì", m: "Collective memory", c: "这些地道的美食承载了几代新加坡人的集体记忆。" },
        { w: "归属感", p: "guī shǔ gǎn", m: "Sense of belonging", c: "熟悉的味道让国人对这片土地产生强烈的归属感。" },
        { w: "开销", p: "kāi xiāo", m: "Expenses / Spending", c: "在小贩中心用餐能节省不少生活开销。" },
        { w: "拉茶", p: "lā chá", m: "Teh Tarik", c: "饭后喝一杯香浓的拉茶是很多国人的习惯。" },
        { w: "鸡排饭", p: "jī pái fàn", m: "Chicken Cutlet Rice", c: "这家摊位的鸡排饭炸得金黄酥脆，非常诱人。" },
        { w: "福建虾面", p: "fú jiàn xiā miàn", m: "Hokkien Prawn Mee", c: "福建虾面的汤头鲜美，是我的最爱。" },
        { w: "拼桌", p: "pīn zhuō", m: "Share a table", c: "繁忙时段，大家通常会很有默契地与陌生人拼桌。" },
        { w: "社交", p: "shè jiāo", m: "Social interaction", c: "小贩中心是邻里间进行日常社交的重要场所。" },
        { w: "交流", p: "jiāo liú", m: "Communication / Exchange", c: "用餐时间是家人朋友间增进情感、进行交流的好机会。" }
    ];
    let idx = 0, flipped = false, startX = 0;
    const card = document.getElementById('card');
    
    function update() {
        const item = data[idx];
        document.getElementById('word-front').innerText = item.w;
        document.getElementById('word-back').innerText = item.w;
        document.getElementById('pinyin').innerText = item.p;
        document.getElementById('meaning').innerText = item.m;
        
        const highlightedText = item.c.replace(item.w, '<span class="text-amber-600 border-b-2 border-amber-200">' + item.w + '</span>');
        document.getElementById('collocation').innerHTML = highlightedText;
        
        document.getElementById('counter').innerText = (idx + 1) + ' / ' + data.length;
        
        flipped = false;
        document.getElementById('front').classList.remove('hidden');
        document.getElementById('back').classList.add('hidden');
        card.classList.remove('card-back-mode');
        card.style.transform = 'translateX(0)';
    }

    function flip() {
        flipped = !flipped;
        document.getElementById('front').classList.toggle('hidden', flipped);
        document.getElementById('back').classList.toggle('hidden', !flipped);
        card.classList.toggle('card-back-mode', flipped);
    }
    function next() { if (idx < data.length - 1) { idx++; update(); } }
    function prev() { if (idx > 0) { idx--; update(); } }
    function playVoice() { 
        const msg = new SpeechSynthesisUtterance(data[idx].w);
        msg.lang = 'zh-CN';
        window.speechSynthesis.speak(msg); 
    }
    window.addEventListener('keydown', e => {
        if (e.key === 'ArrowRight') next();
        else if (e.key === 'ArrowLeft') prev();
        else if (e.key === ' ') { e.preventDefault(); flip(); }
    });
    document.getElementById('app').addEventListener('touchstart', e => startX = e.touches[0].clientX);
    document.getElementById('app').addEventListener('touchend', e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (diff > 80) next(); else if (diff < -80) prev();
    });
    update();
</script>
</body>
</html>
